<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Installera SunMap – Din plats i solen</title>
  <link rel="stylesheet" href="style.css"> </head>
<body style="background-color: #0b1020; color: #dbe2ff; font-family: 'Inter', sans-serif; text-align: center; padding: 40px 20px;">
  
  <header style="margin-bottom: 30px;">
    <a href="index.html" style="text-decoration: none; color: inherit;">
      <img src="sunmap-logo.svg" alt="SunMap Logo" style="height: 40px; width: auto;">
      <h1 style="font-size: 1.5rem; margin: 10px 0 0 0; font-weight: 800;">SunMap</h1>
    </a>
  </header>

  <main style="max-width: 600px; margin: 0 auto;">
    <section class="hero-card" style="padding: 30px; border: 1px solid var(--card-border); background-color: var(--card); border-radius: var(--radius-xl); box-shadow: var(--shadow-1);">
      <h2 style="font-size: 2rem; margin-top: 0; font-weight: 800;">Installera SunMap-appen</h2>
      <p style="color: var(--muted); font-size: 1.1rem; margin-bottom: 30px;">Få snabbare åtkomst till de soligaste uteserveringarna och dela dina bästa platser med vänner – direkt från din hemskärm.</p>
      
      <button id="installBtn" class="btn btn-primary" style="padding: 15px 30px; font-size: 1.2rem; font-weight: 700; width: 100%; border-radius: 999px;">Installera SunMap</button>
      
      <p style="color: var(--muted); font-size: 0.9rem; margin-top: 20px;">Detta kommer att lägga till SunMap som en app på din hemskärm eller ditt skrivbord.</p>
    </section>
  </main>

  <footer style="margin-top: 50px; color: var(--muted); font-size: 0.9rem;">
    <p>© <span id="year"></span> SunMap Tech. Skapad för en soligare stad.</p>
  </footer>

  <script>
    // Sätt år i footern
    document.getElementById('year').textContent = new Date().getFullYear();

    // Logiken för att trigga PWA-installationen (JavaScript)
    let deferredPrompt;
    const installBtn = document.getElementById('installBtn');

    window.addEventListener('beforeinstallprompt', (e) => {
      // Förhindra att webbläsaren visar sin egen fula ruta direkt
      e.preventDefault();
      // Spara händelsen så vi kan trigga den senare
      deferredPrompt = e;
      // Visa installations-knappen
      installBtn.style.display = 'block';
    });

    installBtn.addEventListener('click', async () => {
      if (deferredPrompt) {
        // Visa installations-dialogen
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
          console.log('Användaren installerade appen!');
        }
        deferredPrompt = null;
        installBtn.style.display = 'none';
      }
    });

    // Dölj knappen om appen redan är installerad
    window.addEventListener('appinstalled', () => {
      installBtn.style.display = 'none';
    });
  </script>
</body>
</html>
